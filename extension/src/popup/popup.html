<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PAMExtensions</title>
    <style>
      :root {
        --fg: #1a1a1a;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #2563eb;
        --ok: #16a34a;
        --err: #dc2626;
        --bg-soft: #f9fafb;
      }
      * { box-sizing: border-box; }
      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        font: 13px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--fg);
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .badge {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 999px;
        background: var(--bg-soft);
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .badge.on { color: var(--ok); border-color: var(--ok); }
      .badge.off { color: var(--err); border-color: var(--err); }
      .row { margin: 8px 0; }
      .hint {
        font-size: 12px;
        color: var(--muted);
        background: var(--bg-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
      }
      button {
        width: 100%;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border: 0;
        border-radius: 8px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.secondary {
        color: var(--accent);
        background: #fff;
        border: 1px solid var(--accent);
      }
      #probeOut {
        width: 100%;
        font: 11px/1.4 ui-monospace, "Cascadia Code", Consolas, monospace;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        resize: vertical;
        white-space: pre;
        overflow: auto;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
      }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--muted); flex: none;
      }
      .dot.run { background: var(--accent); }
      .dot.ok { background: var(--ok); }
      .dot.err { background: var(--err); }
      .counts {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 2px 10px;
        font-size: 12px;
        border-top: 1px solid var(--border);
        padding-top: 8px;
        margin-top: 4px;
      }
      .counts .k { color: var(--muted); }
      .counts .v { text-align: right; font-variant-numeric: tabular-nums; }
      .error { color: var(--err); font-size: 12px; }
      .foot {
        margin-top: 10px; padding-top: 8px;
        border-top: 1px solid var(--border);
        font-size: 11px; color: var(--muted);
        display: flex; justify-content: space-between; align-items: center;
      }
      a { color: var(--accent); text-decoration: none; cursor: pointer; }
      /* 유틸리티 hide — 뒤에 정의된 .dates(display:flex) 등을 확실히 덮도록 !important. */
      .hidden { display: none !important; }
      fieldset {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        margin: 8px 0;
      }
      legend { font-size: 11px; font-weight: 600; color: var(--muted); padding: 0 4px; }
      .opt { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 12px; }
      .opt input { width: auto; }
      .opt label { cursor: pointer; }
      .dates { display: flex; gap: 8px; margin-top: 6px; }
      .dates label { font-size: 11px; color: var(--muted); display: flex; flex-direction: column; gap: 2px; flex: 1; }
      .dates input[type="date"] {
        width: 100%; padding: 5px 6px; font-size: 12px;
        border: 1px solid var(--border); border-radius: 6px;
      }
      .autoNote { font-size: 11px; color: var(--muted); margin-top: 6px; }
      .btnRow { display: flex; gap: 8px; }
      .btnRow button { flex: 1; }
    </style>
  </head>
  <body>
    <h1>PAMExtensions <span id="brokerBadge" class="badge">확인 중…</span></h1>

    <!-- (1) 로그인/대상 안내 -->
    <div class="row">
      <div id="guide" class="hint">현재 탭을 확인하는 중…</div>
    </div>

    <!-- (2a) 스크랩 대상 -->
    <fieldset>
      <legend>스크랩 대상</legend>
      <div class="opt">
        <input type="checkbox" id="targetDaily" checked />
        <label for="targetDaily">일자별 자산</label>
      </div>
      <div class="opt">
        <input type="checkbox" id="targetTx" checked />
        <label for="targetTx">거래내역</label>
      </div>
    </fieldset>

    <!-- (2b) 기간 모드 -->
    <fieldset>
      <legend>기간</legend>
      <div class="opt">
        <input type="radio" id="modeAuto" name="rangeMode" value="auto" checked />
        <label for="modeAuto">자동 (증분)</label>
      </div>
      <div class="opt">
        <input type="radio" id="modeManual" name="rangeMode" value="manual" />
        <label for="modeManual">지정</label>
      </div>
      <div id="autoNote" class="autoNote">마지막 수집일 이후를 자동으로 수집합니다.</div>
      <div id="dateInputs" class="dates hidden">
        <label>시작일<input type="date" id="startDate" /></label>
        <label>종료일<input type="date" id="endDate" /></label>
      </div>
    </fieldset>

    <!-- (2c) 수집 시작 / 중단(수집 중에만 표시) -->
    <div class="row">
      <button id="collectBtn" disabled>수집</button>
      <button id="cancelBtn" class="secondary hidden" style="margin-top: 8px;">수집 중단</button>
    </div>

    <!-- (2d) 미리보기 (수집 후 표시) -->
    <div id="preview" class="row hidden">
      <fieldset>
        <legend>미리보기 (업로드 전)</legend>
        <div id="previewCounts" class="counts"></div>
        <div class="btnRow" style="margin-top: 8px;">
          <button id="downloadBtn" class="secondary">JSON 다운로드</button>
          <button id="uploadBtn">업로드</button>
        </div>
      </fieldset>
    </div>

    <!-- (2b) 진단 (콘솔 없이 페이지 구조 확인) -->
    <div class="row">
      <button id="probeBtn" class="secondary" disabled>진단 (페이지 구조 확인)</button>
    </div>
    <div id="probeBox" class="row hidden">
      <textarea id="probeOut" readonly rows="9"
        title="전체 선택 후 복사해서 공유하세요"></textarea>
    </div>

    <!-- (3) 진행 STATUS -->
    <div class="row status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">대기 중</span>
    </div>

    <!-- (4) 업로드 결과 counts -->
    <div id="result" class="row hidden">
      <div id="resultError" class="error hidden"></div>
      <div id="counts" class="counts hidden"></div>
    </div>

    <div class="foot">
      <span id="originLabel">origin: —</span>
      <a id="openOptions">설정</a>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
