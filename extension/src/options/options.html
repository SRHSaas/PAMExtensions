<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PAMExtensions 설정</title>
    <style>
      :root {
        --fg: #1a1a1a;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #2563eb;
        --ok: #16a34a;
        --bg-soft: #f9fafb;
      }
      * { box-sizing: border-box; }
      body {
        max-width: 520px;
        margin: 32px auto;
        padding: 0 20px;
        font: 14px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--fg);
      }
      h1 { font-size: 18px; margin: 0 0 4px; }
      p.sub { color: var(--muted); margin: 0 0 24px; font-size: 13px; }
      .field { margin-bottom: 18px; }
      label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; }
      input[type="url"] {
        width: 100%;
        padding: 9px 11px;
        font-size: 13px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .presets { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
      .preset {
        font-size: 12px;
        padding: 5px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--bg-soft);
        cursor: pointer;
      }
      .preset:hover { border-color: var(--accent); color: var(--accent); }
      .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
      .actions { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
      button {
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border: 0;
        border-radius: 8px;
        cursor: pointer;
      }
      .saved { color: var(--ok); font-size: 13px; opacity: 0; transition: opacity .2s; }
      .saved.show { opacity: 1; }
      .err { color: #dc2626; font-size: 12px; margin-top: 6px; min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>PAMExtensions 설정</h1>
    <p class="sub">스크랩한 데이터를 업로드할 SRHFinance origin을 지정합니다. 업로드는 이 origin에 로그인된 사용자 세션 쿠키로 전송됩니다.</p>

    <div class="field">
      <label for="origin">SRHFinance origin</label>
      <input id="origin" type="url" placeholder="http://localhost:3000" autocomplete="off" />
      <div class="presets">
        <span class="preset" data-origin="http://localhost:3000">dev · localhost:3000</span>
        <span class="preset" data-origin="https://srhfinance.vercel.app">배포 예시</span>
      </div>
      <div class="hint">
        업로드 엔드포인트는 <code>{origin}/api/ingest/portfolio</code> 입니다. 프로토콜·호스트만 입력하세요(끝 슬래시 불필요).
      </div>
      <div id="err" class="err"></div>
    </div>

    <div class="actions">
      <button id="save">저장</button>
      <span id="saved" class="saved">저장됨 ✓</span>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
